<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-5" style="max-width: 500px; width: 100%;">

        <h1 class="text-center mb-4">Editar Usuario</h1>

        <form th:action="@{/admin/actualizar}" th:object="${usuario}" method="post">

            <!-- ID -->
            <input type="hidden" th:field="*{idUsuario}"/>

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}" required/>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" required/>
            </div>

            <div class="mb-3">
                <label class="form-label">Rol</label>
                <select class="form-select" th:field="*{rol}">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <!-- CONTRASEÑA -->
            <div class="mb-3">
                <label class="form-label">Nueva contraseña (opcional)</label>
                <input type="password"
                       name="contrasena"
                       class="form-control"
                       placeholder="Dejar vacío para no cambiarla"/>
            </div>

            <div class="d-flex gap-2">

                <button type="submit" class="btn btn-primary w-100">
                    Actualizar
                </button>

                <a th:href="@{/admin}" class="btn btn-secondary w-100">
                    Volver
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>

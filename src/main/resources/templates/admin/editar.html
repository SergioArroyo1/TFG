<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario - Asistente Inteligente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR PRINCIPAL */
        .main-sidebar {
            width: 70px;
            background: linear-gradient(180deg, #0a1f1f 0%, #0d9488 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #14b8a6, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-logo:hover {
            transform: scale(1.1);
        }

        .sidebar-logo i {
            font-size: 1.5rem;
            color: white;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .sidebar-item {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-item.active {
            background: rgba(20, 184, 166, 0.2);
            color: #14b8a6;
        }

        .sidebar-item i {
            font-size: 1.3rem;
        }

        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }

        /* PANEL LATERAL */
        .secondary-sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .secondary-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .secondary-sidebar-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f2937;
        }

        .secondary-sidebar-content {
            padding: 15px;
            flex: 1;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .nav-item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .nav-item-link:hover {
            background: #f3f4f6;
            color: #8b5cf6;
        }

        .nav-item-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(167, 139, 250, 0.1));
            color: #8b5cf6;
            font-weight: 600;
        }

        .nav-item-link i {
            font-size: 1.1rem;
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .nav-divider {
            height: 1px;
            background: #e5e7eb;
            margin: 15px 0;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .edit-card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        .edit-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .edit-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
        }

        .edit-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .edit-title {
            font-size: 2rem;
            font-weight: 700;
            color: #8b5cf6;
            margin-bottom: 8px;
        }

        .edit-subtitle {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 400;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: #8b5cf6;
        }

        .form-control,
        .form-select {
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            outline: none;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        .btn-save i {
            margin-right: 8px;
        }

        .btn-cancel {
            width: 100%;
            padding: 16px;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            color: #6b7280;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-cancel:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
            color: #4b5563;
        }

        .btn-cancel i {
            margin-right: 8px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-sidebar {
                width: 60px;
            }

            .secondary-sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                z-index: 99;
                transition: left 0.3s ease;
            }

            .main-content {
                padding: 20px;
            }

            .edit-card {
                padding: 35px 25px;
            }

            .edit-title {
                font-size: 1.6rem;
            }

            .edit-icon {
                width: 70px;
                height: 70px;
            }

            .edit-icon i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- SIDEBAR PRINCIPAL -->
    <div class="main-sidebar">
        <!-- Logo AGP -->
        <div class="sidebar-logo">
            AGP
        </div>
        <div class="sidebar-nav">
            <a th:href="@{/dashboard}" class="sidebar-item">
                <i class="bi bi-house-door-fill"></i>
            </a>
            <a th:href="@{/tareas}" class="sidebar-item">
                <i class="bi bi-list-check"></i>
            </a>
            <a th:href="@{/habitos}" class="sidebar-item">
                <i class="bi bi-graph-up"></i>
            </a>
            <a th:href="@{/eventos}" class="sidebar-item">
                <i class="bi bi-calendar-event"></i>
            </a>
            <a th:href="@{/finanzas}" class="sidebar-item">
                <i class="bi bi-currency-dollar"></i>
            </a>
            <a th:href="@{/admin}" class="sidebar-item active" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-shield-lock"></i>
            </a>
        </div>
    </div>

    <!-- PANEL LATERAL -->
    <div class="secondary-sidebar">
        <div class="secondary-sidebar-header">
            <h3 class="secondary-sidebar-title">Administración</h3>
        </div>

        <div class="secondary-sidebar-content">
            <div class="nav-section">
                <h4 class="nav-section-title">Gestión</h4>
                <ul class="nav-item-list">
                    <li>
                        <a th:href="@{/admin}" class="nav-item-link">
                            <i class="bi bi-people"></i>
                            Usuarios
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/dashboard}" class="nav-item-link">
                            <i class="bi bi-speedometer2"></i>
                            Dashboard
                        </a>
                    </li>
                </ul>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-section">
                <h4 class="nav-section-title">Acciones</h4>
                <ul class="nav-item-list">
                    <li>
                        <a th:href="@{/admin/crear}" class="nav-item-link">
                            <i class="bi bi-person-plus"></i>
                            Crear usuario
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">

        <div class="edit-card">

            <div class="edit-header">
                <div class="edit-icon">
                    <i class="bi bi-person-gear"></i>
                </div>
                <h1 class="edit-title">Editar Usuario</h1>
                <p class="edit-subtitle">Actualiza la información del usuario</p>
            </div>

            <form th:action="@{/admin/actualizar}" th:object="${usuario}" method="post">

                <!-- ID oculto -->
                <input type="hidden" th:field="*{idUsuario}"/>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-person"></i>
                        Nombre
                    </label>
                    <input type="text" class="form-control" th:field="*{nombre}" placeholder="Nombre del usuario" required/>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-envelope"></i>
                        Email
                    </label>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="correo@ejemplo.com" required/>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-shield-check"></i>
                        Rol
                    </label>
                    <select class="form-select" th:field="*{rol}">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-key"></i>
                        Nueva contraseña (opcional)
                    </label>
                    <input type="password"
                           name="contrasena"
                           class="form-control"
                           placeholder="Dejar vacío para no cambiarla"/>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-save">
                        <i class="bi bi-check-circle"></i>
                        Actualizar
                    </button>

                    <a th:href="@{/admin}" class="btn-cancel">
                        <i class="bi bi-x-circle"></i>
                        Volver
                    </a>
                </div>

            </form>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/dashboard}">Asistente</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Gestión Usuarios</a>
                </li>

            </ul>

            <!-- Usuario + logout -->
            <span class="navbar-text text-white me-3">
                👤 <span sec:authentication="principal.username"></span>
            </span>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light">Cerrar Sesión</button>
            </form>

        </div>
    </div>
</nav>

<div class="container mt-4">

    <h1 class="mb-4">Panel de Administración</h1>

    <!-- BOTÓN CREAR -->
    <a th:href="@{/admin/crear}" class="btn btn-primary mb-3">
        ➕ Crear Usuario
    </a>

    <!-- TABLA -->
    <div class="card shadow p-3">

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.rol}"></td>

                <td>

                    <a th:href="@{'/admin/editar/' + ${u.idUsuario}}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{'/admin/eliminar/' + ${u.idUsuario}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Seguro que quieres eliminar este usuario?');">
                        Eliminar
                    </a>

                </td>
            </tr>
            </tbody>

        </table>
        <!-- PAGINACIÓN -->
        <nav th:if="${totalPaginas > 1}" class="mt-4">

            <ul class="pagination justify-content-center">

                <!-- ANTERIOR -->
                <li class="page-item"
                    th:classappend="${paginaActual == 0} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/admin(pagina=${paginaActual - 1})}">
                        Anterior
                    </a>
                </li>

                <!-- NÚMEROS -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
                    th:classappend="${i == paginaActual} ? 'active'">

                    <a class="page-link"
                       th:href="@{/admin(pagina=${i})}"
                       th:text="${i + 1}">
                    </a>

                </li>

                <!-- SIGUIENTE -->
                <li class="page-item"
                    th:classappend="${paginaActual >= totalPaginas - 1} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/admin(pagina=${paginaActual + 1})}">
                        Siguiente
                    </a>
                </li>

            </ul>

        </nav>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/dashboard}">Asistente</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tareas}">Tareas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/habitos}">Hábitos</a>
                </li>

                <!-- EVENTOS -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/eventos}">Calendario</a>
                </li>

                <!-- FINANZAS -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/finanzas}">Finanzas</a>
                </li>

                <!-- SOLO ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
            </ul>

            <!-- Usuario + logout -->
            <span class="navbar-text text-white me-3">
                👤 <span sec:authentication="principal.username"></span>
            </span>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light">Cerrar sesión</button>
            </form>

        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <div class="text-center">
        <h2 class="mb-4">
            Bienvenido
            <span sec:authentication="principal.username"></span>
        </h2>

        <p class="lead">Selecciona una opción</p>
    </div>

    <!-- TARJETAS -->
    <div class="row mt-4 justify-content-center">

        <!-- TAREAS -->
        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border border-primary">
                <div class="card-body">
                    <h5 class="card-title">Tareas</h5>
                    <p class="card-text">Gestiona tus tareas</p>
                    <a th:href="@{/tareas}" class="btn btn-primary w-100">Ir</a>
                </div>
            </div>
        </div>

        <!-- HÁBITOS -->
        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border border-success">
                <div class="card-body">
                    <h5 class="card-title">Hábitos</h5>
                    <p class="card-text">Controla tus hábitos</p>
                    <a th:href="@{/habitos}" class="btn btn-success w-100">Ir</a>
                </div>
            </div>
        </div>

        <!-- CALENDARIO -->
        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border-info">
                <div class="card-body">
                    <h5 class="card-title text-info">Calendario</h5>
                    <p class="card-text">Gestiona tus eventos</p>
                    <a th:href="@{/eventos}" class="btn btn-info w-100">Ir</a>
                </div>
            </div>
        </div>

        <!-- FINANZAS -->
        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border-warning">
                <div class="card-body">
                    <h5 class="card-title text-warning">Finanzas</h5>
                    <p class="card-text">Controla tus ingresos y gastos</p>
                    <a th:href="@{/finanzas}" class="btn btn-warning w-100">Ir</a>
                </div>
            </div>
        </div>

        <!-- ADMIN -->
        <div class="col-md-3 mb-3" sec:authorize="hasRole('ADMIN')">
            <div class="card shadow text-center border-danger">
                <div class="card-body">
                    <h5 class="card-title text-danger">Admin</h5>
                    <p class="card-text">Gestión de usuarios</p>
                    <a th:href="@{/admin}" class="btn btn-danger w-100">Ir</a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>

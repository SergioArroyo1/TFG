<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Calendario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/dashboard}">Asistente</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tareas}">Tareas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/habitos}">Hábitos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/eventos}">Calendario</a>
                </li>

                <!-- FINANZAS -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/finanzas}">Finanzas</a>
                </li>

                <!-- ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>

            </ul>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light">Salir</button>
            </form>

        </div>
    </div>
</nav>

<!-- CSRF -->
<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

<div class="container mt-4">

    <h2 class="mb-4">📅 Mi Calendario</h2>

    <div id="calendar" class="bg-white p-3 rounded shadow"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="eventoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Evento</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="idEvento">

                <div class="mb-2">
                    <label>Título</label>
                    <input type="text" id="titulo" class="form-control">
                </div>

                <div class="mb-2">
                    <label>Descripción</label>
                    <input type="text" id="descripcion" class="form-control">
                </div>

                <div class="mb-2">
                    <label>Fecha</label>
                    <input type="date" id="fecha" class="form-control">
                </div>

                <div class="mb-2">
                    <label>Asociar a</label>
                    <select id="tipoRelacion" class="form-select" onchange="cambiarRelacion()">
                        <option value="">Ninguno</option>
                        <option value="tarea">Tarea</option>
                        <option value="habito">Hábito</option>
                    </select>
                </div>

                <div id="bloqueTarea" style="display:none;">
                    <label>Tarea</label>
                    <select id="idTarea" class="form-select">
                        <option value="">Seleccionar tarea</option>
                        <option th:each="t : ${tareas}"
                                th:value="${t.idTarea}"
                                th:text="${t.titulo}">
                        </option>
                    </select>
                </div>

                <div id="bloqueHabito" style="display:none;">
                    <label>Hábito</label>
                    <select id="idHabito" class="form-select">
                        <option value="">Seleccionar hábito</option>
                        <option th:each="h : ${habitos}"
                                th:value="${h.idHabito}"
                                th:text="${h.nombre}">
                        </option>
                    </select>
                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-danger" onclick="eliminarEvento()">Eliminar</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button class="btn btn-primary" onclick="guardar()">Guardar</button>

            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>

    let calendar;
    let modal = new bootstrap.Modal(document.getElementById('eventoModal'));

    document.addEventListener('DOMContentLoaded', function () {

        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

            initialView: 'dayGridMonth',
            locale: 'es',

            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },

            events: '/eventos/json',

            dateClick: function(info) {
                limpiar();
                document.getElementById('fecha').value = info.dateStr;
                modal.show();
            },

            eventClick: function(info) {

                document.getElementById('idEvento').value = info.event.id;
                document.getElementById('titulo').value = info.event.title;
                document.getElementById('fecha').value = info.event.startStr.split("T")[0];

                modal.show();
            }

        });

        calendar.render();
    });

    function cambiarRelacion() {

        let tipo = document.getElementById('tipoRelacion').value;

        document.getElementById('bloqueTarea').style.display =
            (tipo === "tarea") ? "block" : "none";

        document.getElementById('bloqueHabito').style.display =
            (tipo === "habito") ? "block" : "none";
    }

    function limpiar() {

        document.getElementById('idEvento').value = "";
        document.getElementById('titulo').value = "";
        document.getElementById('descripcion').value = "";
        document.getElementById('fecha').value = "";
        document.getElementById('tipoRelacion').value = "";
        document.getElementById('idTarea').value = "";
        document.getElementById('idHabito').value = "";

        cambiarRelacion();
    }

    function guardar() {

        fetch('/eventos/guardar-json', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': document.querySelector('[name="_csrf"]').value
            },
            body: JSON.stringify({
                idEvento: document.getElementById('idEvento').value,
                titulo: document.getElementById('titulo').value,
                descripcion: document.getElementById('descripcion').value,
                fecha: document.getElementById('fecha').value,
                idTarea: document.getElementById('tipoRelacion').value === "tarea"
                    ? document.getElementById('idTarea').value
                    : null,
                idHabito: document.getElementById('tipoRelacion').value === "habito"
                    ? document.getElementById('idHabito').value
                    : null
            })
        }).then(() => {
            modal.hide();
            calendar.refetchEvents();
        });
    }

    function eliminarEvento() {

        let id = document.getElementById('idEvento').value;

        if (!id) return;

        fetch('/eventos/eliminar-json/' + id, {
            method: 'DELETE',
            headers: {
                'X-CSRF-TOKEN': document.querySelector('[name="_csrf"]').value
            }
        }).then(() => {
            modal.hide();
            calendar.refetchEvents();
        });
    }

</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Asistente Inteligente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR PRINCIPAL */
        .main-sidebar {
            width: 70px;
            background: linear-gradient(180deg, #0a1f1f 0%, #0d9488 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #14b8a6, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-logo:hover {
            transform: scale(1.1);
        }

        .sidebar-logo i {
            font-size: 1.5rem;
            color: white;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .sidebar-item {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-item.active {
            background: rgba(20, 184, 166, 0.2);
            color: #14b8a6;
        }

        .sidebar-item i {
            font-size: 1.3rem;
        }

        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }

        /* PANEL LATERAL */
        .secondary-sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .secondary-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .secondary-sidebar-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f2937;
        }

        .secondary-sidebar-content {
            padding: 15px;
            flex: 1;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .nav-item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .nav-item-link:hover {
            background: #f3f4f6;
            color: #0ea5e9;
        }

        .nav-item-link.active {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1), rgba(6, 182, 212, 0.1));
            color: #0ea5e9;
            font-weight: 600;
        }

        .nav-item-link i {
            font-size: 1.1rem;
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .nav-divider {
            height: 1px;
            background: #e5e7eb;
            margin: 15px 0;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: #f9fafb;
        }

        /* HEADER */
        .content-header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title i {
            color: #0ea5e9;
        }

        .btn-ai {
            padding: 10px 20px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(14, 165, 233, 0.4);
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: #f9fafb;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-logout {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #fef2f2;
            border-color: #ef4444;
            color: #ef4444;
        }

        /* CONTENIDO */
        .content-body {
            padding: 30px;
        }

        /* LOADER IA */
        .loader-ia {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
            text-align: center;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 0.3em;
            color: #0ea5e9;
        }

        .loader-text {
            margin-top: 15px;
            color: #64748b;
            font-weight: 500;
        }

        /* ALERTA IA */
        .ai-alert {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border-left: 4px solid #0ea5e9;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(14, 165, 233, 0.15);
        }

        .ai-alert-title {
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .ai-alert-content {
            color: #1e40af;
            white-space: pre-line;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* CALENDARIO */
        .calendar-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* FullCalendar customization */
        .fc {
            font-family: 'Poppins', sans-serif;
        }

        .fc .fc-toolbar-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .fc .fc-button-primary {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border: none;
            padding: 8px 16px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .fc .fc-button-primary:hover {
            background: linear-gradient(135deg, #0284c7, #0891b2);
            transform: translateY(-1px);
        }

        .fc .fc-button-primary:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            opacity: 1;
        }

        .fc .fc-daygrid-day-number {
            color: #4b5563;
            font-weight: 600;
        }

        .fc .fc-col-header-cell {
            background: #f9fafb;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 12px 0;
        }

        .fc .fc-event {
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Evento asociado a TAREA (azul) */
        .fc .fc-event.evento-tarea {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .fc .fc-event.evento-tarea:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        /* Evento asociado a HÁBITO (verde) */
        .fc .fc-event.evento-habito {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .fc .fc-event.evento-habito:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }

        /* Evento SIN ASOCIACIÓN (gris) */
        .fc .fc-event.evento-normal {
            background: linear-gradient(135deg, #6b7280, #4b5563);
        }

        .fc .fc-event.evento-normal:hover {
            background: linear-gradient(135deg, #4b5563, #374151);
        }

        /* MODAL */
        .modal-content {
            border-radius: 15px;
            border: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 20px 25px;
            border: none;
        }

        .modal-header .modal-title {
            font-weight: 700;
            font-size: 1.3rem;
        }

        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 20px 25px;
            border-top: 1px solid #e5e7eb;
        }

        .modal .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal .form-control,
        .modal .form-select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .modal .form-control:focus,
        .modal .form-select:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .modal .form-check-input {
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e2e8f0;
            cursor: pointer;
        }

        .modal .form-check-input:checked {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
        }

        .modal .form-check-label {
            font-weight: 500;
            color: #4b5563;
            margin-left: 8px;
            cursor: pointer;
        }

        .modal .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .modal .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border: none;
        }

        .modal .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .modal .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
        }

        .modal .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .modal .btn-secondary {
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            color: #6b7280;
        }

        .modal .btn-secondary:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
            color: #4b5563;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-sidebar {
                width: 60px;
            }

            .secondary-sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                z-index: 99;
                transition: left 0.3s ease;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px 20px;
            }

            .header-title {
                font-size: 1.3rem;
            }

            .content-body {
                padding: 20px;
            }

            .calendar-card {
                padding: 15px;
            }

            .user-info {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- CSRF -->
<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

<div class="app-container">

    <!-- SIDEBAR PRINCIPAL -->
    <div class="main-sidebar">
        <!-- Logo AGP -->
        <div class="sidebar-logo">
            AGP
        </div>

        <div class="sidebar-nav">
            <a th:href="@{/dashboard}" class="sidebar-item">
                <i class="bi bi-house-door-fill"></i>
            </a>
            <a th:href="@{/tareas}" class="sidebar-item">
                <i class="bi bi-list-check"></i>
            </a>
            <a th:href="@{/habitos}" class="sidebar-item">
                <i class="bi bi-graph-up"></i>
            </a>
            <a th:href="@{/eventos}" class="sidebar-item active">
                <i class="bi bi-calendar-event"></i>
            </a>
            <a th:href="@{/finanzas}" class="sidebar-item">
                <i class="bi bi-currency-dollar"></i>
            </a>
            <a th:href="@{/admin}" class="sidebar-item" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-shield-lock"></i>
            </a>
        </div>
    </div>

    <!-- PANEL LATERAL -->
    <div class="secondary-sidebar">
        <div class="secondary-sidebar-header">
            <h3 class="secondary-sidebar-title">Calendario</h3>
        </div>

        <div class="secondary-sidebar-content">
            <div class="nav-section">
                <h4 class="nav-section-title">Vistas</h4>
                <ul class="nav-item-list">
                    <li>
                        <a href="#" class="nav-item-link active" onclick="calendar.changeView('dayGridMonth'); return false;">
                            <i class="bi bi-calendar3"></i>
                            Mes
                        </a>
                    </li>
                </ul>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-section">
                <h4 class="nav-section-title">Navegación</h4>
                <ul class="nav-item-list">
                    <li>
                        <a href="#" class="nav-item-link" onclick="calendar.today(); return false;">
                            <i class="bi bi-calendar-check"></i>
                            Hoy
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-item-link" onclick="calendar.prev(); return false;">
                            <i class="bi bi-chevron-left"></i>
                            Anterior
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-item-link" onclick="calendar.next(); return false;">
                            <i class="bi bi-chevron-right"></i>
                            Siguiente
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">

        <!-- HEADER -->
        <div class="content-header">
            <div class="header-left">
                <h1 class="header-title">
                    <i class="bi bi-calendar-event"></i>
                    Mi Calendario
                </h1>
                <button class="btn-ai" onclick="analizarEventos()">
                    <i class="bi bi-brain"></i>
                    Analizar con IA
                </button>
            </div>

            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <span sec:authentication="principal.username"></span>
                </div>

                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn-logout">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Salir
                    </button>
                </form>
            </div>
        </div>

        <!-- CONTENIDO -->
        <div class="content-body">

            <!-- LOADER IA -->
            <div id="loaderIA" class="loader-ia" style="display:none;">
                <div class="spinner-border"></div>
                <p class="loader-text">Analizando tus eventos...</p>
            </div>

            <!-- ALERTA IA -->
            <div id="resultadoIA" class="ai-alert" style="display:none;">
                <div class="ai-alert-title">
                    <i class="bi bi-brain"></i>
                    Análisis de IA - Tus Eventos
                </div>
                <div id="contenidoIA" class="ai-alert-content"></div>
            </div>

            <!-- CALENDARIO -->
            <div class="calendar-card">
                <div id="calendar"></div>
            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="eventoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-calendar-plus"></i>
                    Evento
                </h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="idEvento">

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-card-heading"></i>
                        Título
                    </label>
                    <input type="text" id="titulo" class="form-control" placeholder="Título del evento">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-text-paragraph"></i>
                        Descripción
                    </label>
                    <input type="text" id="descripcion" class="form-control" placeholder="Describe el evento">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-calendar3"></i>
                        Fecha
                    </label>
                    <input type="date" id="fecha" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-link-45deg"></i>
                        Asociar a
                    </label>
                    <select id="tipoRelacion" class="form-select" onchange="cambiarRelacion()">
                        <option value="">Ninguno</option>
                        <option value="tarea">Tarea</option>
                        <option value="habito">Hábito</option>
                    </select>
                </div>

                <!-- TAREAS -->
                <div id="bloqueTarea" class="mb-3" style="display:none;">
                    <label class="form-label">
                        <i class="bi bi-check-square"></i>
                        Tarea
                    </label>
                    <select id="idTarea" class="form-select">
                        <option value="">Seleccionar tarea</option>
                        <option th:each="t : ${tareas}"
                                th:value="${t.idTarea}"
                                th:text="${t.titulo}">
                        </option>
                    </select>
                </div>

                <!-- HÁBITOS -->
                <div id="bloqueHabito" class="mb-3" style="display:none;">
                    <label class="form-label">
                        <i class="bi bi-arrow-repeat"></i>
                        Hábito
                    </label>
                    <select id="idHabito" class="form-select">
                        <option value="">Seleccionar hábito</option>
                        <option th:each="h : ${habitos}"
                                th:value="${h.idHabito}"
                                th:text="${h.nombre}">
                        </option>
                    </select>
                </div>

                <!-- COMPLETADO -->
                <div id="bloqueCompletado" class="form-check" style="display:none;">
                    <input class="form-check-input" type="checkbox" id="completado">
                    <label class="form-check-label">
                        Marcar como completado
                    </label>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-danger" onclick="eliminarEvento()">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cerrar
                </button>
                <button class="btn btn-primary" onclick="guardar()">
                    <i class="bi bi-check-circle"></i> Guardar
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>

    let calendar;

    let modal = new bootstrap.Modal(document.getElementById('eventoModal'));

    document.addEventListener('DOMContentLoaded', function () {

        calendar = new FullCalendar.Calendar(

            document.getElementById('calendar'),

            {
                initialView: 'dayGridMonth',

                locale: 'es',

                headerToolbar: {

                    left: 'prev,next today',

                    center: 'title',

                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },

                events: '/api/eventos/json',

                eventDidMount: function(info) {
                    // Asignar clase CSS según el tipo de evento
                    let props = info.event.extendedProps;

                    if (props.idTarea) {
                        info.el.classList.add('evento-tarea');
                    } else if (props.idHabito) {
                        info.el.classList.add('evento-habito');
                    } else {
                        info.el.classList.add('evento-normal');
                    }
                },

                dateClick: function(info) {

                    limpiar();

                    document.getElementById('fecha').value = info.dateStr;

                    modal.show();
                },

                eventClick: function(info) {

                    document.getElementById('idEvento').value = info.event.id;

                    document.getElementById('titulo').value = info.event.title;

                    document.getElementById('fecha').value = info.event.startStr.split("T")[0];

                    let props = info.event.extendedProps;

                    document.getElementById('descripcion').value = props.descripcion || "";

                    document.getElementById('completado').checked = props.completado || false;

                    document.getElementById('bloqueCompletado').style.display =
                        (props.completado !== undefined) ? "block" : "none";

                    if (props.idTarea) {

                        document.getElementById('tipoRelacion').value = "tarea";

                        cambiarRelacion();

                        document.getElementById('idTarea').value = props.idTarea;

                    } else if (props.idHabito) {

                        document.getElementById('tipoRelacion').value = "habito";

                        cambiarRelacion();

                        document.getElementById('idHabito').value = props.idHabito;

                    } else {

                        document.getElementById('tipoRelacion').value = "";

                        cambiarRelacion();
                    }

                    modal.show();
                }
            }
        );

        calendar.render();
    });

    // ======================
    // ANALIZAR IA
    // ======================

    function analizarEventos() {

        document.getElementById('resultadoIA').style.display = "none";

        document.getElementById('loaderIA').style.display = "block";

        fetch('/api/eventos/analizar')

            .then(res => res.text())

            .then(data => {

                document.getElementById('loaderIA').style.display = "none";

                let box = document.getElementById('resultadoIA');

                box.style.display = "block";

                document.getElementById('contenidoIA').innerText = data;
            })

            .catch(() => {

                document.getElementById('loaderIA').style.display = "none";

                alert("Error al analizar con IA");
            });
    }

    // ======================
    // RELACIONES
    // ======================

    function cambiarRelacion() {

        let tipo = document.getElementById('tipoRelacion').value;

        document.getElementById('bloqueTarea').style.display =
            (tipo === "tarea") ? "block" : "none";

        document.getElementById('bloqueHabito').style.display =
            (tipo === "habito") ? "block" : "none";

        document.getElementById('bloqueCompletado').style.display =
            (tipo === "tarea" || tipo === "habito") ? "block" : "none";
    }

    // ======================
    // LIMPIAR
    // ======================

    function limpiar() {

        document.getElementById('idEvento').value = "";

        document.getElementById('titulo').value = "";

        document.getElementById('descripcion').value = "";

        document.getElementById('fecha').value = "";

        document.getElementById('tipoRelacion').value = "";

        document.getElementById('idTarea').value = "";

        document.getElementById('idHabito').value = "";

        document.getElementById('completado').checked = false;

        document.getElementById('bloqueCompletado').style.display = "none";

        cambiarRelacion();
    }

    // ======================
    // GUARDAR
    // ======================

    function guardar() {

        fetch('/api/eventos/guardar', {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json',

                'X-CSRF-TOKEN': document.querySelector('[name="_csrf"]').value
            },

            body: JSON.stringify({

                idEvento: document.getElementById('idEvento').value,

                titulo: document.getElementById('titulo').value,

                descripcion: document.getElementById('descripcion').value,

                fecha: document.getElementById('fecha').value,

                completado: document.getElementById('completado').checked.toString(),

                idTarea:
                    document.getElementById('tipoRelacion').value === "tarea"
                        ? document.getElementById('idTarea').value
                        : null,

                idHabito:
                    document.getElementById('tipoRelacion').value === "habito"
                        ? document.getElementById('idHabito').value
                        : null
            })

        }).then(() => {

            modal.hide();

            calendar.refetchEvents();
        });
    }

    // ======================
    // ELIMINAR
    // ======================

    function eliminarEvento() {

        let id = document.getElementById('idEvento').value;

        if (!id) return;

        fetch('/api/eventos/eliminar/' + id, {

            method: 'DELETE',

            headers: {

                'X-CSRF-TOKEN': document.querySelector('[name="_csrf"]').value
            }

        }).then(() => {

            modal.hide();

            calendar.refetchEvents();
        });
    }

</script>

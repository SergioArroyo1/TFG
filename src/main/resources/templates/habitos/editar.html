<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar hábito</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-5" style="max-width: 500px; width: 100%;">

        <h2 class="text-center mb-4">Editar hábito</h2>

        <form th:action="@{/habitos/actualizar}" method="post" th:object="${habito}">

            <!-- ID -->
            <input type="hidden" th:field="*{idHabito}" />

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <input type="text" class="form-control" th:field="*{descripcion}" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Frecuencia</label>
                <input type="text" class="form-control" th:field="*{frecuencia}" required />
            </div>

            <!-- CSRF -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="d-flex gap-2">

                <button type="submit" class="btn btn-success w-100">
                    Guardar cambios
                </button>

                <a th:href="@{/habitos}" class="btn btn-secondary w-100">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>

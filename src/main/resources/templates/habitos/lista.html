<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Hábitos - Asistente Inteligente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR PRINCIPAL */
        .main-sidebar {
            width: 70px;
            background: linear-gradient(180deg, #0a1f1f 0%, #0d9488 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #14b8a6, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-logo:hover {
            transform: scale(1.1);
        }

        .sidebar-logo i {
            font-size: 1.5rem;
            color: white;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .sidebar-item {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-item.active {
            background: rgba(20, 184, 166, 0.2);
            color: #14b8a6;
        }

        .sidebar-item i {
            font-size: 1.3rem;
        }

        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }

        /* PANEL LATERAL */
        .secondary-sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .secondary-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .secondary-sidebar-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f2937;
        }

        .secondary-sidebar-content {
            padding: 15px;
            flex: 1;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .nav-item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .nav-item-link:hover {
            background: #f3f4f6;
            color: #10b981;
        }

        .nav-item-link.active {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(20, 184, 166, 0.1));
            color: #10b981;
            font-weight: 600;
        }

        .nav-item-link i {
            font-size: 1.1rem;
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .nav-divider {
            height: 1px;
            background: #e5e7eb;
            margin: 15px 0;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: #f9fafb;
        }

        /* HEADER */
        .content-header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title i {
            color: #10b981;
        }

        .btn-ai {
            padding: 10px 20px;
            background: linear-gradient(135deg, #10b981, #14b8a6);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4);
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: #f9fafb;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #10b981, #14b8a6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-logout {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #fef2f2;
            border-color: #ef4444;
            color: #ef4444;
        }

        /* CONTENIDO */
        .content-body {
            padding: 30px;
        }

        /* ALERTA IA */
        .ai-alert {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-left: 4px solid #10b981;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.15);
        }

        .ai-alert-title {
            font-weight: 700;
            color: #065f46;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .ai-alert-content {
            color: #047857;
            white-space: pre-line;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* FORMULARIO CREAR */
        .create-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        .create-form {
            display: grid;
            grid-template-columns: 2fr 3fr 2fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i {
            color: #10b981;
            font-size: 0.95rem;
        }

        .form-control {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn-create {
            padding: 12px 28px;
            background: linear-gradient(135deg, #10b981, #14b8a6);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4);
        }

        /* TABLA */
        .table-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: linear-gradient(135deg, #10b981, #14b8a6);
        }

        .table thead th {
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            padding: 18px 20px;
            border: none;
        }

        .table tbody tr {
            transition: all 0.2s ease;
        }

        .table tbody tr:hover {
            background: #f9fafb;
        }

        .table tbody td {
            padding: 16px 20px;
            color: #4b5563;
            font-size: 0.9rem;
            vertical-align: middle;
            border-bottom: 1px solid #f3f4f6;
        }

        .badge-frequency {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-diario {
            background: #dbeafe;
            color: #1e40af;
        }


        .btn-action {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
            display: inline-block;
            margin-right: 6px;
        }

        .btn-edit {
            background: #fef3c7;
            color: #92400e;
        }

        .btn-edit:hover {
            background: #fde68a;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-delete:hover {
            background: #fecaca;
            transform: translateY(-1px);
        }

        /* PAGINACIÓN */
        .pagination-wrapper {
            padding: 25px;
            display: flex;
            justify-content: center;
        }

        .pagination {
            display: flex;
            gap: 8px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .page-item {
            display: block;
        }

        .page-link {
            padding: 10px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            color: #4b5563;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }

        .page-link:hover {
            background: #f9fafb;
            border-color: #10b981;
            color: #10b981;
        }

        .page-item.active .page-link {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            border-color: #10b981;
            color: white;
        }

        .page-item.disabled .page-link {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #e5e7eb;
        }

        .page-item.disabled .page-link:hover {
            background: #f3f4f6;
            border-color: #e5e7eb;
            color: #9ca3af;
        }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            .create-form {
                grid-template-columns: 1fr;
            }

            .table-card {
                overflow-x: auto;
            }
        }

        @media (max-width: 768px) {
            .main-sidebar {
                width: 60px;
            }

            .secondary-sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                z-index: 99;
                transition: left 0.3s ease;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px 20px;
            }

            .header-title {
                font-size: 1.3rem;
            }

            .content-body {
                padding: 20px;
            }

            .user-info {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- SIDEBAR PRINCIPAL -->
    <div class="main-sidebar">
        <!-- Logo AGP -->
        <div class="sidebar-logo">
            AGP
        </div>

        <div class="sidebar-nav">
            <a th:href="@{/dashboard}" class="sidebar-item">
                <i class="bi bi-house-door-fill"></i>
            </a>
            <a th:href="@{/tareas}" class="sidebar-item">
                <i class="bi bi-list-check"></i>
            </a>
            <a th:href="@{/habitos}" class="sidebar-item active">
                <i class="bi bi-graph-up"></i>
            </a>
            <a th:href="@{/eventos}" class="sidebar-item">
                <i class="bi bi-calendar-event"></i>
            </a>
            <a th:href="@{/finanzas}" class="sidebar-item">
                <i class="bi bi-currency-dollar"></i>
            </a>
            <a th:href="@{/admin}" class="sidebar-item" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-shield-lock"></i>
            </a>
        </div>

    </div>

    <!-- PANEL LATERAL -->
    <div class="secondary-sidebar">

        <div class="secondary-sidebar-header">
            <h3 class="secondary-sidebar-title">Hábitos</h3>
        </div>

        <div class="secondary-sidebar-content">

            <!-- VISTAS -->
            <div class="nav-section">

                <h4 class="nav-section-title">Vistas</h4>

                <ul class="nav-item-list">

                    <li>
                        <a th:href="@{/habitos}"
                           class="nav-item-link">

                            <i class="bi bi-list-ul"></i>
                            Todos
                        </a>
                    </li>

                </ul>

            </div>

            <div class="nav-divider"></div>

            <!-- BUSCADOR -->
            <div class="nav-section">

                <h4 class="nav-section-title">Buscar hábito</h4>

                <form th:action="@{/habitos}" method="get">

                    <div class="mb-3">

                        <input type="text"
                               name="buscar"
                               class="form-control"
                               placeholder="Buscar por nombre..."
                               th:value="${buscar}">

                    </div>

                    <button type="submit" class="btn-create w-100">

                        <i class="bi bi-search me-2"></i>
                        Buscar

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">

        <!-- HEADER -->
        <div class="content-header">
            <div class="header-left">
                <h1 class="header-title">
                    <i class="bi bi-graph-up"></i>
                    Mis Hábitos
                </h1>
                <a th:href="@{/habitos/analizar}" class="btn-ai">
                    <i class="bi bi-brain"></i>
                    Analizar con IA
                </a>
            </div>

            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <span sec:authentication="principal.username"></span>
                </div>

                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn-logout">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Salir
                    </button>
                </form>
            </div>
        </div>

        <!-- CONTENIDO -->
        <div class="content-body">

            <!-- ALERTA IA -->
            <div class="ai-alert" th:if="${analisisHabitos != null}">
                <div class="ai-alert-title">
                    <i class="bi bi-brain"></i>
                    Análisis de IA - Tus Hábitos
                </div>
                <div class="ai-alert-content" th:text="${analisisHabitos}"></div>
            </div>

            <!-- Mensaje Error-->
            <div th:if="${error}" class="alert alert-danger mb-3">
                <span th:text="${error}"></span>
            </div>

            <!-- FORMULARIO CREAR -->
            <div class="create-card">
                <form th:action="@{/habitos/crear}" method="post" class="create-form">

                    <div class="form-group">
                        <label class="form-label">
                            <i class="bi bi-card-heading"></i>
                            Nombre
                        </label>
                        <input type="text" class="form-control" name="nombre" placeholder="Ej: Hacer ejercicio" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="bi bi-text-paragraph"></i>
                            Descripción
                        </label>
                        <input type="text" class="form-control" name="descripcion" placeholder="Describe tu hábito" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="bi bi-calendar-check"></i>
                            Frecuencia
                        </label>
                        <input type="text" class="form-control" name="frecuencia" placeholder="Ej: Diario" required />
                    </div>

                    <!-- CSRF -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <button type="submit" class="btn-create">
                            <i class="bi bi-plus-circle"></i> Crear
                        </button>
                    </div>

                </form>
            </div>

            <!-- TABLA -->
            <div class="table-card">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Frecuencia</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="h : ${habitos}">
                        <td>
                            <strong th:text="${h.nombre}"></strong>
                        </td>
                        <td th:text="${h.descripcion}"></td>
                        <td>
                            <span class="badge-frequency badge-diario" th:text="${h.frecuencia}"></span>
                        </td>
                        <td>
                            <a th:href="@{/habitos/editar/{id}(id=${h.idHabito})}" class="btn-action btn-edit">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/habitos/eliminar/{id}(id=${h.idHabito})}"
                               class="btn-action btn-delete"
                               onclick="return confirm('¿Seguro que quieres eliminar este hábito?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <!-- PAGINACIÓN -->
                <div class="pagination-wrapper" th:if="${totalPaginas > 1}">
                    <ul class="pagination">
                        <!-- ANTERIOR -->
                        <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/habitos(pagina=${paginaActual - 1})}">
                                <i class="bi bi-chevron-left"></i> Anterior
                            </a>
                        </li>

                        <!-- NÚMEROS -->
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
                            th:classappend="${i == paginaActual} ? 'active'">
                            <a class="page-link"
                               th:href="@{/habitos(pagina=${i})}"
                               th:text="${i + 1}">
                            </a>
                        </li>

                        <!-- SIGUIENTE -->
                        <li class="page-item" th:classappend="${paginaActual + 1 >= totalPaginas} ? 'disabled'">
                            <a class="page-link" th:href="@{/habitos(pagina=${paginaActual + 1})}">
                                Siguiente <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

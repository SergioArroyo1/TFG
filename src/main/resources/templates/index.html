<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AGP - Asistente de Gestión Personal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            min-height:100vh;
            overflow:hidden;

            background:
                    linear-gradient(
                            135deg,
                            rgba(13,148,136,0.95) 0%,
                            rgba(20,184,166,0.90) 40%,
                            rgba(6,182,212,0.90) 100%
                    );
        }

        /* Fondo decorativo */
        .background-shapes{
            position:absolute;
            inset:0;
            overflow:hidden;
            z-index:0;
        }

        .shape{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.08);
            backdrop-filter: blur(5px);
        }

        .shape:nth-child(1){
            width:300px;
            height:300px;
            top:-80px;
            right:-80px;
        }

        .shape:nth-child(2){
            width:220px;
            height:220px;
            bottom:-60px;
            left:-60px;
        }

        .shape:nth-child(3){
            width:150px;
            height:150px;
            top:55%;
            right:15%;
        }

        .shape:nth-child(4){
            width:120px;
            height:120px;
            top:18%;
            left:12%;
        }

        /* Contenido */
        .hero-section{
            position:relative;
            z-index:1;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .hero-card{

            width:100%;
            max-width:650px;

            background:rgba(255,255,255,0.97);

            border-radius:30px;

            padding:60px 50px;

            text-align:center;

            box-shadow:
                    0 25px 60px rgba(0,0,0,0.25);

            backdrop-filter: blur(12px);
        }

        /* Logo */
        .logo-container{
            margin-bottom:30px;
        }

        .logo-circle{

            width:120px;
            height:120px;

            margin:auto;

            border-radius:30px;

            background:linear-gradient(
                    135deg,
                    #0d9488,
                    #14b8a6,
                    #06b6d4
            );

            display:flex;
            align-items:center;
            justify-content:center;

            box-shadow:
                    0 12px 30px rgba(13,148,136,0.35);
        }

        .logo-text{

            color:white;
            font-size:2.8rem;
            font-weight:800;
            letter-spacing:2px;
        }

        .title{
            font-size:3rem;
            font-weight:800;
            color:#0f172a;
            margin-bottom:15px;
        }

        .title span{
            color:#0d9488;
        }

        .subtitle{
            color:#64748b;
            font-size:1.1rem;
            line-height:1.7;
            margin-bottom:40px;
        }

        .features{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:40px;
        }

        .feature-badge{

            background:#f0fdfa;
            color:#0f766e;

            padding:10px 18px;

            border-radius:50px;

            font-size:0.9rem;
            font-weight:600;

            border:1px solid #ccfbf1;
        }

        .feature-badge i{
            margin-right:6px;
        }

        /* Botones */
        .btn-custom{

            border:none;

            border-radius:14px;

            padding:16px 24px;

            font-size:1rem;
            font-weight:700;

            transition:all .3s ease;

            width:100%;
        }

        .btn-login{

            background:linear-gradient(
                    135deg,
                    #0d9488,
                    #14b8a6
            );

            color:white;

            box-shadow:
                    0 10px 25px rgba(13,148,136,0.30);
        }

        .btn-login:hover{

            transform:translateY(-3px);

            box-shadow:
                    0 15px 35px rgba(13,148,136,0.40);

            color:white;
        }

        .btn-register{

            background:white;

            border:2px solid #14b8a6;

            color:#0f766e;
        }

        .btn-register:hover{

            background:#14b8a6;
            color:white;

            transform:translateY(-3px);
        }

        .btn-custom i{
            margin-right:8px;
        }

        .footer-text{

            margin-top:35px;

            color:#94a3b8;

            font-size:0.9rem;
        }

        @media(max-width:768px){

            .hero-card{
                padding:45px 30px;
            }

            .title{
                font-size:2.2rem;
            }

            .subtitle{
                font-size:1rem;
            }

            .logo-circle{
                width:100px;
                height:100px;
            }

            .logo-text{
                font-size:2.2rem;
            }
        }

    </style>
</head>

<body>

<!-- Fondo -->
<div class="background-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<!-- Contenido -->
<section class="hero-section">

    <div class="hero-card">

        <!-- LOGO -->
        <div class="logo-container">

            <div class="logo-circle">
                <div class="logo-text">AGP</div>
            </div>

        </div>

        <!-- TITULO -->
        <h1 class="title">
            Bienvenido a <span>AGP</span>
        </h1>

        <!-- SUBTITULO -->
        <p class="subtitle">
            Tu asistente inteligente de gestión personal para organizar
            tareas, hábitos, eventos y finanzas en una sola plataforma moderna,
            segura y eficiente.
        </p>

        <!-- FEATURES -->
        <div class="features">

            <div class="feature-badge">
                <i class="bi bi-check2-circle"></i>
                Tareas
            </div>

            <div class="feature-badge">
                <i class="bi bi-graph-up-arrow"></i>
                Hábitos
            </div>

            <div class="feature-badge">
                <i class="bi bi-calendar-event"></i>
                Eventos
            </div>

            <div class="feature-badge">
                <i class="bi bi-cash-coin"></i>
                Finanzas
            </div>

        </div>

        <!-- BOTONES -->
        <div class="d-grid gap-3">

            <!-- LOGIN -->
            <a th:href="@{/usuario/login}"
               class="btn btn-custom btn-login">

                <i class="bi bi-box-arrow-in-right"></i>
                Iniciar Sesión

            </a>

            <!-- REGISTRO -->
            <a th:href="@{/usuario/registro}"
               class="btn btn-custom btn-register">

                <i class="bi bi-person-plus-fill"></i>
                Crear Cuenta

            </a>

        </div>

        <!-- FOOTER -->
        <div class="footer-text">
            AGP · Asistente de Gestión Personal Inteligente
        </div>

    </div>

</section>

</body>
</html>

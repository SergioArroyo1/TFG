<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas - Asistente Inteligente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR PRINCIPAL */
        .main-sidebar {
            width: 70px;
            background: linear-gradient(180deg, #0a1f1f 0%, #0d9488 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #14b8a6, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-logo:hover {
            transform: scale(1.1);
        }

        .sidebar-logo i {
            font-size: 1.5rem;
            color: white;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .sidebar-item {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            position: relative;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-item.active {
            background: rgba(20, 184, 166, 0.2);
            color: #14b8a6;
        }

        .sidebar-item i {
            font-size: 1.3rem;
        }


        /* PANEL LATERAL */
        .secondary-sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .secondary-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .secondary-sidebar-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f2937;
        }

        .secondary-sidebar-content {
            padding: 15px;
            flex: 1;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .nav-item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .nav-item-link:hover {
            background: #f3f4f6;
            color: #0d9488;
        }

        .nav-item-link.active {
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.1), rgba(20, 184, 166, 0.1));
            color: #0d9488;
            font-weight: 600;
        }

        .nav-item-link i {
            font-size: 1.1rem;
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .nav-divider {
            height: 1px;
            background: #e5e7eb;
            margin: 15px 0;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: #f9fafb;
        }

        .content-header {
            background: white;
            padding: 25px 35px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-ai {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(6, 182, 212, 0.4);
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .user-name {
            font-weight: 600;
            color: #1f2937;
            font-size: 0.95rem;
        }

        .btn-logout {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #fef2f2;
            border-color: #ef4444;
            color: #ef4444;
        }

        .content-body {
            padding: 25px 35px;
        }

        /* ALERTAS */
        .alert-ia {
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            border: none;
            border-radius: 12px;
            border-left: 4px solid #0891b2;
            padding: 20px;
            margin-bottom: 25px;
        }

        .alert-ia strong {
            color: #0891b2;
            font-weight: 700;
        }

        /* FORMULARIO CREAR */
        .create-form-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        .create-form-card .form-label {
            font-weight: 600;
            color: #4b5563;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .create-form-card .form-control,
        .create-form-card .form-select {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 14px;
            transition: all 0.3s ease;
        }

        .create-form-card .form-control:focus,
        .create-form-card .form-select:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
            outline: none;
        }

        .btn-create {
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(13, 148, 136, 0.3);
        }

        /* TABLA */
        .table-card {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            color: white;
        }

        .table thead th {
            border: none;
            padding: 16px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table tbody tr {
            transition: background 0.2s ease;
        }

        .table tbody tr:hover {
            background: #f9fafb;
        }

        .table tbody td {
            padding: 16px;
            vertical-align: middle;
            border-bottom: 1px solid #f3f4f6;
        }

        .badge-estado {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .badge-completada {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-pendiente {
            background: #fef3c7;
            color: #92400e;
        }

        .btn-action {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 6px;
        }

        .btn-edit {
            background: #fef3c7;
            color: #92400e;
            border: none;
        }

        .btn-edit:hover {
            background: #fde68a;
            color: #78350f;
        }

        .btn-delete {
            background: #fee2e2;
            color: #991b1b;
            border: none;
        }

        .btn-delete:hover {
            background: #fecaca;
            color: #7f1d1d;
        }

        /* PAGINACIÓN */
        .pagination {
            margin: 0;
            padding: 20px;
            justify-content: center;
        }

        .pagination .page-item .page-link {
            border: 1px solid #e5e7eb;
            color: #4b5563;
            margin: 0 4px;
            border-radius: 8px;
            padding: 8px 16px;
            transition: all 0.2s ease;
        }

        .pagination .page-item .page-link:hover {
            background: #f3f4f6;
            border-color: #0d9488;
            color: #0d9488;
        }

        .pagination .page-item.active .page-link {
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            border-color: #0d9488;
            color: white;
        }

        .pagination .page-item.disabled .page-link {
            background: #f9fafb;
            border-color: #e5e7eb;
            color: #9ca3af;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-sidebar {
                width: 60px;
            }

            .secondary-sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                z-index: 99;
                transition: left 0.3s ease;
            }

            .content-header {
                padding: 20px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .content-body {
                padding: 20px;
            }

            .table-responsive {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- SIDEBAR PRINCIPAL -->
    <div class="main-sidebar">
        <!-- Logo AGP -->
        <div class="sidebar-logo">
            AGP
        </div>

        <div class="sidebar-nav">
            <a th:href="@{/dashboard}" class="sidebar-item">
                <i class="bi bi-house-door-fill"></i>
            </a>
            <a th:href="@{/tareas}" class="sidebar-item active">
                <i class="bi bi-list-check"></i>
            </a>
            <a th:href="@{/habitos}" class="sidebar-item">
                <i class="bi bi-graph-up"></i>
            </a>
            <a th:href="@{/eventos}" class="sidebar-item">
                <i class="bi bi-calendar-event"></i>
            </a>
            <a th:href="@{/finanzas}" class="sidebar-item">
                <i class="bi bi-currency-dollar"></i>
            </a>
            <a th:href="@{/admin}" class="sidebar-item" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-shield-lock"></i>
            </a>
        </div>
    </div>

    <!-- PANEL LATERAL -->
    <div class="secondary-sidebar">

        <div class="secondary-sidebar-header">
            <h3 class="secondary-sidebar-title">Tareas</h3>
        </div>

        <div class="secondary-sidebar-content">

            <!-- VISTAS -->
            <div class="nav-section">

                <h4 class="nav-section-title">Vistas</h4>

                <ul class="nav-item-list">

                    <li>
                        <a th:href="@{/tareas}"
                           class="nav-item-link">

                            <i class="bi bi-list-ul"></i>
                            Todos
                        </a>
                    </li>

                </ul>

            </div>

            <div class="nav-divider"></div>

            <!-- BUSCADOR -->
            <div class="nav-section">

                <h4 class="nav-section-title">Buscar Tarea</h4>

                <form th:action="@{/tareas}" method="get">

                    <div class="mb-3">

                        <input type="text"
                               name="buscar"
                               class="form-control"
                               placeholder="Buscar por titulo..."
                               th:value="${buscar}">

                    </div>

                    <button type="submit" class="btn-create w-100">

                        <i class="bi bi-search me-2"></i>
                        Buscar

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">

        <!-- Header -->
        <div class="content-header">
            <h1 class="content-title">
                <i class="bi bi-list-check me-2" style="color: #14b8a6;"></i>
                Mis Tareas
            </h1>
            <div class="header-actions">

                <a th:href="@{/tareas/analizar}" class="btn-ai">
                    <i class="bi bi-stars"></i>
                    Analizar con IA
                </a>

                <div class="user-info">
                    <div class="user-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <span class="user-name" sec:authentication="principal.username">Usuario</span>

                    <form th:action="@{/logout}" method="post" style="margin: 0;">
                        <button type="submit" class="btn-logout">
                            <i class="bi bi-box-arrow-right me-1"></i>
                            Salir
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Body -->
        <div class="content-body">

            <!-- Alerta IA -->
            <div class="alert-ia" th:if="${analisisTareas != null}">
                <strong><i class="bi bi-stars me-2"></i>IA - Análisis de tareas:</strong>
                <div class="mt-3" style="white-space: pre-line;" th:text="${analisisTareas}"></div>
            </div>

            <!-- Mensaje de error -->
            <div th:if="${error}" class="alert alert-danger mb-3">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Formulario crear tarea -->
            <div class="create-form-card">
                <form th:action="@{/tareas/crear}" method="post" class="row g-3">

                    <div class="col-md-3">
                        <label class="form-label">Título</label>
                        <input type="text" class="form-control" name="titulo" placeholder="Título de la tarea" required />
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" class="form-control" name="descripcion" placeholder="Descripción" required />
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Fecha límite</label>
                        <input type="date" class="form-control" name="fechaLimite" required />
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Estado</label>
                        <select class="form-select" name="estado" required>
                            <option value="PENDIENTE" selected>Pendiente</option>
                            <option value="COMPLETADA">Completada</option>
                        </select>
                    </div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn-create w-100">
                            <i class="bi bi-plus-lg me-2"></i>
                            Crear
                        </button>
                    </div>

                </form>
            </div>

            <!-- Tabla de tareas -->
            <div class="table-card">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Título</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                            <th>Fecha límite</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${tareas}">
                            <td>
                                <strong th:text="${t.titulo}"></strong>
                            </td>
                            <td th:text="${t.descripcion}"></td>
                            <td>
                                    <span class="badge-estado"
                                          th:classappend="${t.estado.name() == 'COMPLETADA'} ? 'badge-completada' : 'badge-pendiente'"
                                          th:text="${t.estado}">
                                    </span>
                            </td>
                            <td>
                                <i class="bi bi-calendar3 me-2" style="color: #6b7280;"></i>
                                <span th:text="${t.fechaLimite}"></span>
                            </td>
                            <td>
                                <a th:href="@{/tareas/editar/{id}(id=${t.idTarea})}" class="btn-action btn-edit">
                                    <i class="bi bi-pencil"></i>
                                    Editar
                                </a>
                                <a th:href="@{/tareas/eliminar/{id}(id=${t.idTarea})}"
                                   class="btn-action btn-delete"
                                   onclick="return confirm('¿Seguro que quieres eliminar esta tarea?')">
                                    <i class="bi bi-trash"></i>
                                    Eliminar
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <nav th:if="${totalPaginas > 1}">
                    <ul class="pagination">

                        <li class="page-item"
                            th:classappend="${paginaActual == 0} ? 'disabled'">

                            <a class="page-link"
                               th:href="@{/tareas(pagina=${paginaActual - 1}, buscar=${buscar})}">

                                <i class="bi bi-chevron-left me-1"></i>
                                Anterior
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
                            th:classappend="${i == paginaActual} ? 'active'">

                            <a class="page-link"
                               th:href="@{/tareas(pagina=${i}, buscar=${buscar})}"
                               th:text="${i + 1}">
                            </a>
                        </li>

                        <li class="page-item"
                            th:classappend="${paginaActual + 1 >= totalPaginas} ? 'disabled'">

                            <a class="page-link"
                               th:href="@{/tareas(pagina=${paginaActual + 1}, buscar=${buscar})}">

                                Siguiente
                                <i class="bi bi-chevron-right ms-1"></i>
                            </a>
                        </li>

                    </ul>
                </nav>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

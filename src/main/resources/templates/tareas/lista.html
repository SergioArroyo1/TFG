<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Tareas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!--  NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/dashboard}">Asistente</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/tareas}">Tareas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/habitos}">Hábitos</a>
                </li>

                <!-- CALENDARIO -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/eventos}">Calendario</a>
                </li>

                <!-- FINANZAS -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/finanzas}">Finanzas</a>
                </li>

                <!-- ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>

            </ul>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light">Salir</button>
            </form>

        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Mis Tareas</h2>

    <!-- FORMULARIO CREAR -->
    <div class="card shadow p-4 mb-4">
        <form th:action="@{/tareas/crear}" method="post" class="row g-3">

            <div class="col-md-4">
                <input type="text" class="form-control" name="titulo" placeholder="Título" required />
            </div>

            <div class="col-md-4">
                <input type="text" class="form-control" name="descripcion" placeholder="Descripción" required />
            </div>

            <div class="col-md-3">
                <input type="date" class="form-control" name="fechaLimite" required />
            </div>

            <!-- CSRF -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="col-md-1">
                <button class="btn btn-primary w-100">Guardar</button>
            </div>

        </form>
    </div>

    <!-- TABLA -->
    <div class="card shadow p-3">

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Título</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="t : ${tareas}">
                <td th:text="${t.titulo}"></td>
                <td th:text="${t.descripcion}"></td>

                <td>
                    <a th:href="@{/tareas/editar/{id}(id=${t.idTarea})}" class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{/tareas/eliminar/{id}(id=${t.idTarea})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Seguro que quieres eliminar esta tarea?')">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Tareas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/dashboard}">Asistente</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/tareas}">Tareas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/habitos}">Hábitos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/eventos}">Calendario</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/finanzas}">Finanzas</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>

            </ul>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light">Salir</button>
            </form>

        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Mis Tareas</h2>

    <!-- BOTÓN IA -->
    <div class="mb-3">
        <a th:href="@{/tareas/analizar(pagina=${paginaActual})}"
           class="btn btn-info">
            🤖 Analizar tareas con IA
        </a>
    </div>

    <!-- IA RESULTADO -->
    <div class="alert alert-info mb-4" th:if="${analisisTareas != null}">
        <strong>🤖 IA - Análisis de tareas:</strong>
        <div class="mt-3"
             style="white-space: pre-line;"
             th:text="${analisisTareas}">
        </div>
    </div>

    <!-- FORMULARIO CREAR -->
    <div class="card shadow p-4 mb-4">

        <form th:action="@{/tareas/crear}" method="post" class="row g-3">

            <div class="col-md-3">
                <input type="text"
                       class="form-control"
                       name="titulo"
                       placeholder="Título"
                       required />
            </div>

            <div class="col-md-3">
                <input type="text"
                       class="form-control"
                       name="descripcion"
                       placeholder="Descripción"
                       required />
            </div>

            <div class="col-md-2">
                <input type="date"
                       class="form-control"
                       name="fechaLimite"
                       required />
            </div>

            <div class="col-md-2">

                <select class="form-select" name="estado" required>

                    <option value="PENDIENTE" selected>
                        Pendiente
                    </option>

                    <option value="COMPLETADA">
                        Completada
                    </option>

                </select>

            </div>

            <!-- CSRF -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="col-md-2">
                <button class="btn btn-primary w-100">
                    Guardar
                </button>
            </div>

        </form>

    </div>

    <!-- TABLA -->
    <div class="card shadow p-3">

        <table class="table table-striped table-hover align-middle">

            <thead class="table-dark">

            <tr>
                <th>Título</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Fecha límite</th>
                <th>Acciones</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="t : ${tareas}">

                <td th:text="${t.titulo}"></td>

                <td th:text="${t.descripcion}"></td>

                <td>

                    <span class="badge"
                          th:classappend="${t.estado.name() == 'COMPLETADA'} ? 'bg-success' : 'bg-warning text-dark'"
                          th:text="${t.estado}">
                    </span>

                </td>

                <td th:text="${t.fechaLimite}"></td>

                <td>

                    <a th:href="@{/tareas/editar/{id}(id=${t.idTarea})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{/tareas/eliminar/{id}(id=${t.idTarea})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Seguro que quieres eliminar esta tarea?')">
                        Eliminar
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <!-- PAGINACIÓN -->
        <nav class="mt-4" th:if="${totalPaginas > 1}">

            <ul class="pagination justify-content-center">

                <!-- ANTERIOR -->
                <li class="page-item"
                    th:classappend="${paginaActual == 0} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/tareas(pagina=${paginaActual - 1})}">
                        Anterior
                    </a>

                </li>

                <!-- NÚMEROS -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
                    th:classappend="${i == paginaActual} ? 'active'">

                    <a class="page-link"
                       th:href="@{/tareas(pagina=${i})}"
                       th:text="${i + 1}">
                    </a>

                </li>

                <!-- SIGUIENTE -->
                <li class="page-item"
                    th:classappend="${paginaActual + 1 >= totalPaginas} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/tareas(pagina=${paginaActual + 1})}">
                        Siguiente
                    </a>

                </li>

            </ul>

        </nav>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <!--  Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-5" style="max-width: 400px; width: 100%;">

        <h2 class="text-center mb-4">Iniciar sesión</h2>

        <!--  MENSAJE DE ERROR -->
        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/usuario/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" name="username" class="form-control" placeholder="correo@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <!-- CSRF -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <button type="submit" class="btn btn-primary w-100">
                Entrar
            </button>

        </form>

        <div class="text-center mt-3">
            <a th:href="@{/usuario/registro}" class="text-decoration-none">
                ¿No tienes cuenta? Regístrate
            </a>
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro - AGP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins', sans-serif;

            min-height:100vh;

            background:
                    linear-gradient(
                            135deg,
                            rgba(13,148,136,0.92) 0%,
                            rgba(20,184,166,0.88) 50%,
                            rgba(6,182,212,0.88) 100%
                    );

            display:flex;
            align-items:center;
            justify-content:center;

            overflow:hidden;
            position:relative;
        }

        /* Fondo decorativo */
        .background-shapes{
            position:absolute;
            inset:0;
            overflow:hidden;
            z-index:0;
        }

        .shape{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.08);
        }

        .shape:nth-child(1){
            width:300px;
            height:300px;
            top:-100px;
            right:-80px;
        }

        .shape:nth-child(2){
            width:250px;
            height:250px;
            bottom:-90px;
            left:-70px;
        }

        .shape:nth-child(3){
            width:180px;
            height:180px;
            top:60%;
            right:12%;
        }

        .shape:nth-child(4){
            width:120px;
            height:120px;
            top:15%;
            left:10%;
        }

        /* Card */
        .register-container{
            position:relative;
            z-index:1;
            width:100%;
            max-width:480px;
            padding:20px;
        }

        .register-card{

            background:rgba(255,255,255,0.98);

            border-radius:28px;

            padding:50px 40px;

            box-shadow:
                    0 20px 60px rgba(0,0,0,0.25);

            backdrop-filter: blur(12px);
        }

        /* Logo */
        .logo-wrapper{
            text-align:center;
            margin-bottom:30px;
        }

        .logo-circle{

            width:90px;
            height:90px;

            margin:auto;

            border-radius:24px;

            background:linear-gradient(
                    135deg,
                    #0d9488,
                    #14b8a6,
                    #06b6d4
            );

            display:flex;
            align-items:center;
            justify-content:center;

            box-shadow:
                    0 10px 25px rgba(13,148,136,0.35);
        }

        .logo-circle span{
            color:white;
            font-size:2rem;
            font-weight:800;
            letter-spacing:2px;
        }

        .title{

            margin-top:20px;

            font-size:2rem;
            font-weight:800;

            color:#0f172a;
        }

        .subtitle{

            color:#64748b;
            margin-top:8px;

            font-size:0.95rem;
        }

        /* Labels */
        .form-label{

            font-weight:600;
            color:#334155;

            font-size:0.9rem;

            margin-bottom:8px;
        }

        /* Inputs */
        .input-group-custom{
            position:relative;
        }

        .input-group-custom i{

            position:absolute;

            left:16px;
            top:50%;

            transform:translateY(-50%);

            color:#94a3b8;

            z-index:2;
        }

        .form-control{

            border-radius:14px;

            padding:14px 16px 14px 48px;

            border:2px solid #e2e8f0;

            transition:all .3s ease;
        }

        .form-control:focus{

            border-color:#14b8a6;

            box-shadow:
                    0 0 0 4px rgba(20,184,166,0.12);
        }

        /* Botón */
        .btn-register{

            width:100%;

            padding:15px;

            border:none;

            border-radius:14px;

            background:
                    linear-gradient(
                            135deg,
                            #0d9488,
                            #14b8a6
                    );

            color:white;

            font-weight:700;
            font-size:1rem;

            transition:all .3s ease;

            margin-top:10px;

            box-shadow:
                    0 10px 25px rgba(13,148,136,0.30);
        }

        .btn-register:hover{

            transform:translateY(-3px);

            box-shadow:
                    0 14px 35px rgba(13,148,136,0.40);
        }

        .btn-register i{
            margin-right:8px;
        }

        /* Footer */
        .login-link{

            text-align:center;
            margin-top:25px;

            color:#64748b;
        }

        .login-link a{

            color:#0d9488;

            font-weight:700;

            text-decoration:none;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

        .back-home{

            margin-top:25px;
            text-align:center;
        }

        .back-home a{

            color:white;

            text-decoration:none;

            font-weight:600;
        }

        .back-home a:hover{
            opacity:.85;
        }

        @media(max-width:576px){

            .register-card{
                padding:40px 28px;
            }

            .title{
                font-size:1.7rem;
            }
        }

    </style>
</head>

<body>

<!-- Fondo -->
<div class="background-shapes">

    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>

</div>

<div class="register-container">

    <div class="register-card">

        <!-- LOGO -->
        <div class="logo-wrapper">

            <div class="logo-circle">
                <span>AGP</span>
            </div>

            <h1 class="title">
                Crear Cuenta
            </h1>

            <p class="subtitle">
                Regístrate y empieza a organizar tu vida
            </p>

        </div>

        <!-- FORM -->
        <form th:action="@{/usuario/registro}"
              th:object="${usuario}"
              method="post">

            <!-- Nombre -->
            <div class="mb-4">

                <label class="form-label">
                    Nombre
                </label>

                <div class="input-group-custom">

                    <i class="bi bi-person-fill"></i>

                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           placeholder="Tu nombre"
                           required>

                </div>

            </div>

            <!-- Email -->
            <div class="mb-4">

                <label class="form-label">
                    Correo electrónico
                </label>

                <div class="input-group-custom">

                    <i class="bi bi-envelope-fill"></i>

                    <input type="email"
                           class="form-control"
                           th:field="*{email}"
                           placeholder="correo@email.com"
                           required>

                </div>

            </div>

            <!-- Contraseña -->
            <div class="mb-4">

                <label class="form-label">
                    Contraseña
                </label>

                <div class="input-group-custom">

                    <i class="bi bi-lock-fill"></i>

                    <input type="password"
                           class="form-control"
                           th:field="*{contrasena}"
                           placeholder="••••••••"
                           required>

                </div>

            </div>

            <!-- CSRF -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <!-- BOTÓN -->
            <button type="submit"
                    class="btn-register">

                <i class="bi bi-person-plus-fill"></i>
                Crear Cuenta

            </button>

        </form>

        <!-- Login -->
        <div class="login-link">

            ¿Ya tienes cuenta?
            <a th:href="@{/usuario/login}">
                Inicia sesión
            </a>

        </div>

    </div>

    <!-- Volver -->
    <div class="back-home">

        <a th:href="@{/}">
            <i class="bi bi-arrow-left"></i>
            Volver al inicio
        </a>

    </div>

</div>

</body>
</html>

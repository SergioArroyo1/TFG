<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-5" style="max-width: 450px; width: 100%;">

        <h2 class="text-center mb-4">Crear cuenta</h2>

        <form th:action="@{/usuario/registro}" th:object="${usuario}" method="post">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}" placeholder="Tu nombre" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" placeholder="correo@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" th:field="*{contrasena}" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Registrarse
            </button>

        </form>

        <div class="text-center mt-3">
            <a th:href="@{/usuario/login}" class="text-decoration-none">
                ¿Ya tienes cuenta? Inicia sesión
            </a>
        </div>

    </div>

</div>

</body>
</html>
